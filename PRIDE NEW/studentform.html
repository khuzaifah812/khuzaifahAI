<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration System</title>

    <style>
        body{
           
            background-color: rgba(241, 234, 234, 0.6);
            justify-content: center;
            align-items: center;
            margin: 0;
            height: 100vh;
            padding: 0;
        }
       
        .container{
            background-color: rgba(241, 234, 234, 0.6); 
        }
        h2{
            color: rgb(10, 10, 10);
            font-weight: bolder;
            text-align: center; 
            font-size: 40px;
        }
        h3{
            color: rgb(10, 10, 10);
            font-weight: bolder;
            text-align: center; 
            font-size: 30px;
            background-color: rgb(0, 255, 0);
            padding: 10px;
        }
        h3:hover{
            background-color: rgb(37, 37, 37);
            color: rgb(4, 245, 64);
        }
        h4{
            color: rgb(10, 10, 10);
            font-weight: bolder;
            text-align: center; 
            font-size: 30px;
            background-color: rgb(0, 255, 0);
            padding: 10px;
            margin-left:  0;
        }
        .regForm{
            display: block;
            padding: 20px;
            margin: 20px;
            height: fit-content;
            width:fit-content;
            background-color: rgba(241, 234, 234, 0.6);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            left: 20%;
            position: absolute;
            overflow: auto;

        }
        label{
            font-size: 20px;
            font-weight: bolder;
            color: rgb(10, 10, 10);
            display: block;
            margin: 5px; 
            padding-top: 5px;
        }
        .row, .parent{
            display:grid;
            grid-template-columns: 400px 400px;
            grid-template-rows: 50px 50px;
            gap: 20px;
            
        }
        input {
            width: 70%;
            height: 20px;
            padding-bottom: 5px;
            margin: 5px 0;
            border-radius: 4px;
            border: 1px solid #080808;
        }
        select {
            width: 70%;
            height: 30px;
            padding: 5px;
            margin-top: 10px 0;
            border-radius: 4px;
            border: 1px solid #080808;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            margin-top: 20px;
            font-size: 28px;
            font-weight: bolder;
        }
        button:hover {
            background: #a9c3ee;
            color: black;
            font-size: 34px;
        }
        button:active {
            background: #f15b04;
        }

       
    </style>
   
</head>
<body>
    
<section >
   

    <form class="regForm" action="parent.html" method="post">
        <h2>Student Registration Form</h2>

        <!-- Names -->
         <h3>Student Information</h3>
        <div class="row">
            <div>
                <label>First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" id="lastName" required>
            </div>
        

        <!-- Gender -->
         <div>
        <label>Gender</label>
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>
        </div>

        <!-- Class & Year -->
        
            <div>
                <label>Class</label>
                 <select id="class" required>
            <option value="">Select class</option>
            <option>S.1</option>
            <option>S.2</option>
            <option>S.3</option>
            <option>S.4</option>
            <option>S.5</option>
            <option>S.6</option>
                    
        </select>
            </div>
            <div>
                <label>Year</label>
                <input type="number" id="year" value="2026" required>
            </div>
        

        <!-- DOB & Age -->
        
            <div>
                <label>Date of Birth</label>
                <input type="date" id="dob" placeholder="YYYY-MM-DD" required>
            </div>
            <div>
                <label>Age</label>
                <input type="number" id="age" placeholder="Enter your age" required>
            </div>
        

        <!-- Tribe & Nationality -->
        
            <div>
                <label>Tribe</label>
                <input type="text" id="tribe" placeholder="Enter your tribe" required>
            </div>
            <div>
                <label>Nationality</label>
                <input type="text" id="nationality" placeholder="Enter your nationality" required>
            </div>
            <div>
                <label>Contact Number</label>
                <input type="tel" id="contact" placeholder="e.g., 078-456-7890" maxlength="10" minlength="10" required>
            </div>

        <!-- Email -->
         <div>
                <label>Email</label>
        <input type="email" id="email" placeholder="e.g., example@gmail.com"  title="it should include @gmail.com" required>
            </div>
        <!-- Address -->
          <div>
                <label>COUNTRY</label>
                <input type="text" id="country" placeholder="Enter your country" required>
            </div>
        
            <div>
                <label>District</label>
                <input type="text" id="district" placeholder="Enter your district" required>
            </div>
            <div>
                <label>Village</label>
                <input type="text" id="village" placeholder="Enter your village" required>
            </div>
        </div>
    

        <button type="submit">CLICK OK </button>

    </form>
</section>

</body>
</html>
