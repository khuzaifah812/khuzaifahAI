<!DOCTYPE html>
<html>
    <head>
        <title>Khuzaifah AI Grid</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    </head>
        <style>
            body {
                font-family: Arial;
                background: rgb(51, 73, 122);
                color: white;
                text-align: center;
                padding: 20px;
            }
            .grid-container {
                width: fit-content;
                height: 200vh;
                display: grid;
                grid-auto-columns: 1fr;
                
                grid-auto-rows: 1fr;
                grid-template-areas: 
                    "b1 b1"
                    "b5 b5"
                    "b2 b4"
                    "b3 b3";
                gap: 0px;
                margin: 20px auto;
            
            }
        .grid-item{
                background-color: rgb(9, 231, 9);
                padding: 20px;
                border-radius: 5px;
            }
            .container{
            background-color: rgba(241, 234, 234, 0.6);
            
            
           
        }
        h2{
            color: rgb(10, 10, 10);
            font-weight: bolder;
            text-align: center; 
            font-size: 40px;
        }
        h3{
            color: white;
            font-weight: bolder;
            text-align: center; 
            font-size: 50px;
            background-color: rgb(59, 40, 139);
            padding: 10px;
        }
        h4{
            color: white;
            font-weight: bolder;
            text-align: center; 
            font-size: 30px;
            background-color: rgb(39, 4, 134);
            padding: 10px;
            margin-left:  0;
        }
    .regForm{
            display: block;
            padding: 20px;
            margin: 20px;
            height: fit-content;
            width:fit-content;
            background-color: rgba(241, 234, 234, 0.6);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

        }
        .father, .mother{
            display: block;
            padding: 20px;
            margin-top: 0px;
            height: fit-content;
            width: 95%;
            background-color: rgba(241, 234, 234, 0.6);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        label{
            font-size: 20px;
            font-weight: bolder;
            color: rgb(10, 10, 10);
            display: block;
            margin: 5px; 
            padding-top: 5px;
        }
        .row, .parent{
            display:grid;
            grid-template-columns: 400px 400px;
            grid-template-rows: 50px 50px;
            gap: 20px;
           
            
        }
        input {
            width: 70%;
            height: 20px;
            padding-bottom: 5px;
            margin: 5px 0;
            border-radius: 4px;
            border: 1px solid #080808;
        }
        select {
            width: 70%;
            height: 30px;
            padding: 5px;
            margin-top: 10px 0;
            border-radius: 4px;
            border: 1px solid #080808;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
             margin-top: 20px;
             font-size: 28px;
        }
        button:hover {
            background: #1606ec;
        }
        button:active {
            background: #f10410;
        }

        </style>
    </head>
    <body>
        <div class="grid-container">
            <nav class="grid-item" style="grid-area: b1;">
                <h2> REGISTRATION FORM</h2>

    <form class="regForm">

        <!-- Names -->
         <h3>Student Information</h3>
        <div class="row">
            <div>
                <label>First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" id="lastName" required>
            </div>
        

        <!-- Gender -->
         <div>
        <label>Gender</label>
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>
        </div>

        <!-- Class & Year -->
        
            <div>
                <label>Class</label>
                 <select id="class" required>
            <option value="">Select class</option>
            <option>S.1</option>
            <option>S.2</option>
            <option>S.3</option>
            <option>S.4</option>
            <option>S.5</option>
            <option>S.6</option>
                    
        </select>
            </div>
            <div>
                <label>Year</label>
                <input type="number" id="year" value="2026" required>
            </div>
        

        <!-- DOB & Age -->
        
            <div>
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>
            <div>
                <label>Age</label>
                <input type="number" id="age" value="10" required>
            </div>
        

        <!-- Tribe & Nationality -->
        
            <div>
                <label>Tribe</label>
                <input type="text" id="tribe" required>
            </div>
            <div>
                <label>Nationality</label>
                <input type="text" id="nationality" required>
            </div>
            <div>
                <label>Contact Number</label>
                <input type="tel" id="contact" placeholder="e.g., 078-456-7890" maxlength="10" minlength="10" required><br>
            </div>

        <!-- Email -->
         <div>
                <label>Email</label>
        <input type="email" id="email" placeholder="e.g., example@gmail.com" pattern="@gmail.com" title="it should include @gmail.com" required>
            </div>
        <!-- Address -->
        
            <div>
                <label>Country</label>
                <input type="text" id="country" required>
            </div>
            <div>
                <label>District</label>
                <input type="text" id="district" required>
            </div>
            <div>
                <label>Village</label>
                <input type="text" id="village" required>
            </div>
        </div>
    
            </nav>
            <div class="grid-item" style="grid-area: b5">
                 <h3>Parent Information</h3>
            </div>
            <nav class="grid-item" style="grid-area: b2;">
                <nav class="father">

                    <!---Father's Information--->
           <div>  <h4>Father's Information</h4>   </div>
        
         <div>
        <label>Father's Name</label>
        <input type="text" id="father" required>
        </div>

            <div>
                <label>Tribe</label>
                <input type="text" id="tribe" required>
            </div>

            <div>
                <label>Nationality</label>
                <input type="text" id="nationality" required>
            </div>
            <!-- Contact -->
             <div>  
         <label>Contact Number</label>
        <input type="tel" id="contact" placeholder="e.g., 078-456-7890" maxlength="10" minlength="10" required><br>
           </div>
        <!-- Email -->
         <div>
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g., example@gmail.com" pattern="@gmail.com" title="it should include @gmail.com" required>
         </div> 

        <!-- Address -->
        
            <div>
                <label>District</label>
                <input type="text" id="district" required>
            </div>
            <div>
                <label>Village</label>
                <input type="text" id="village" required>
            </div>
        

        <!-- Optional Career -->
         <div>
        <label>Career (Optional)</label>
        <input type="text" id="career">
        </div>

    </nav>  
            </nav>
            <nav class="grid-item" style="grid-area: b4">
                <!...............Mother's Information.............>
             
            <nav class="mother">
            <div> <h4>Mother's Information</h4> </div>
                <div>
        <label>Mother's Name</label>
        <input type="text" id="mother" required>
        </div>  

        <div>
                <label>Tribe</label>
                <input type="text" id="tribe" required>
        </div>  

            <div>
                <label>Nationality</label>
                <input type="text" id="nationality" required>
            </div>

        <!-- Contact -->
         <div>
        <label>Contact Number</label>
        <input type="tel" id="contact" placeholder="e.g., 078-456-7890" maxlength="10" minlength="10" required><br>
        </div>

        <!-- Email -->
         <div>
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g., example@gmail.com" pattern="@gmail.com" title="it should include @gmail.com"  required>
         </div> 

        <!-- Address -->
    
            <div>
                <label>District</label>
                <input type="text" id="district" required>
            </div>
            <div>
                <label>Village</label>
                <input type="text" id="village" required>
            </div>
        

        <!-- Optional Career -->
            <div>
        <label>Career (Optional)</label>
        <input type="text" id="career"><br>
        </div>  
    </nav>
        
    </nav>  
            </nav>
             <div class="grid-item" style="grid-area: b3">
                <button type="submit">Submit</button>
             </div>
           
            <!-- <div class="grid-item" style="grid-area: b6">Web Development</div>  -->
        </div>
        
    </body>
</html>
