<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    
    <title>Quiz Game</title>
    
    <style>
        body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}
h1{
    color: #333;
    font-size: 45px;
}

.container {
    margin-top: 50px;
}

#quiz-box {
    background: white;
    width: 300px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

input {
    width: 90%;
    padding: 8px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    cursor: pointer;
}

        
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Game</h1>

    <div id="quiz-box">
        <p id="question">Click Start to begin the quiz</p>
        <input type="text" id="answer" placeholder="Enter your answer">
        <button onclick="nextQuestion()">Submit</button>
        <button onclick="startQuiz()">Start Quiz</button>

        <h2 id="score">Score: 0%</h2>
    </div>
</div>

<script >
    let score = 0;
let current = 0;

const quiz = [
    { q: "What keyword defines a function in JS?", a: "function" },
    { q: "Which symbol is used for comments?", a: "//" },
    { q: "What prints output in browser console?", a: "console.log" },
    { q: "Which keyword declares a variable?", a: "let" },
    { q: "What data type is true/false?", a: "boolean" }
];

function startQuiz() {
    score = 0;
    current = 0;
    document.getElementById("score").innerText = "Score: 0%";
    showQuestion();
}

function showQuestion() {
    document.getElementById("question").innerText =
        quiz[current].q;
}

function nextQuestion() {
    let userAnswer = document.getElementById("answer").value.toLowerCase();

    if (userAnswer === quiz[current].a) {
        score += 20;
    }

    current++;
    document.getElementById("answer").value = "";

    if (current < quiz.length) {
        showQuestion();
    } else {
        document.getElementById("question").innerText = "Quiz Finished!";
        document.getElementById("score").innerText = "Final Score: " + score + "%";
    }
}
</script>
</body>
</html>
